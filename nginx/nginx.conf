events {}

http {
    upstream webcam_backend {
        server webcam:8000;
    }

    upstream navidrome_backend {
        server navidrome:4533;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://webcam_backend/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        location /stream {
            proxy_pass http://webcam_backend/stream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        location /health {
            proxy_pass http://webcam_backend/health;
        }

        location /music/ {
            proxy_pass http://navidrome_backend/music/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ai/ {
            proxy_pass http://hollama:4173/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}